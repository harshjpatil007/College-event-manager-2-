<!DOCTYPE html>
<html>
<head>
<title>College Event Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>College Event Manager</h1>

<div class="form-box">

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Enter Name">
<input type="password" id="loginPass" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p>New User? <span onclick="showRegister()">Register Here</span></p>

</div>


<div class="form-box hidden" id="registerBox">

<h2>Register</h2>

<input type="text" id="regName" placeholder="Name">
<input type="text" id="regBranch" placeholder="Branch">
<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">Register</button>

<p><span onclick="showLogin()">Back to Login</span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
